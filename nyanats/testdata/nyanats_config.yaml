# nyanats 示例配置文件
# 可直接將此文件內容作為字串傳入 nyanats.New()，或反序列化為 NatsConfig 結構體傳入 nyanats.NewC()

# NATS 伺服器主機位址 (預設: 127.0.0.1)
nats_server_host: "127.0.0.1"

# NATS 伺服器埠號 (預設: 4222)
nats_server_port: 4222

# 連線驗證使用者名稱 (可選，留空則不使用驗證)
nats_user: ""

# 連線驗證密碼 (可選，留空則不使用驗證)
nats_password: ""

# 用戶端識別名稱 (預設: 自動生成 UUID)
# nats_client_name: ""

# 連線中斷後最大重新連線次數 (預設: 5)
nats_max_reconnects: 5

# 重新連線等待間隔秒數 (預設: 2)
nats_reconnect_wait: 2

# 初始連線逾時秒數 (預設: 10)
nats_connect_timeout: 10

# 全域預設 AES 對稱加密金鑰 (可選，留空則明文傳輸)
# 長度必須為 16 / 24 / 32 字節，分別對應 AES-128 / AES-192 / AES-256
# 可使用 nyanats.GenerateRandomKey() 生成隨機金鑰字串
# nats_encryption_key: ""

# 針對特定主題 (Subject) 設定獨立加密金鑰 (可選)
# - 若主題匹配，優先使用此處的金鑰；若無匹配，回退至全域金鑰
# - 值設為空字串 "" 代表該主題以明文傳輸，不加密
# - 金鑰長度要求與全域金鑰相同 (16 / 24 / 32 字節)
# nats_theme_keys:
#   "theme.secret": "YOUR_32_BYTE_ENCRYPTION_KEY_!!"
#   "theme.public": ""
