# ==========================================================
# NATS 核心服务器配置
# ==========================================================

# 服务器名称，在集群中必须唯一
server_name: "NyaNATS_Dev_Server"

# 监听地址和端口
# 4222 是 NATS 默认端口
host: "127.0.0.1"
port: 4222

# HTTP 监控端口
# 生产环境下可以通过浏览器访问 http://localhost:8222 查看服务器状态、连接数等
http_port: 8222

# ==========================================================
# 日志配置 (Logging)
# ==========================================================

# 开启调试日志（生产环境建议只开 info，排查问题时开 debug）
debug: true
# 开启跟踪日志（会记录原始协议报文，非常详细，极度耗性能，仅限本地开发）
trace: false
# 日志记录时间戳
logtime: true

# 将日志输出到文件（如果不指定，默认输出到控制台）
# log_file: "nats-server.log"

# ==========================================================
# 安全与认证 (Authentication)
# ==========================================================

authorization {
  # 对应你 NyaNATS 中的 NatsUser 和 NatsPassword
  user: "admin"
  password: "password123"
  
  # 权限控制（生产环境必配）
  # 限制该用户只能发布和订阅哪些主题
  # permissions {
  #   publish: ["*"]
  #   subscribe: ["*"]
  # }
}

# ==========================================================
# 性能限制 (Limits)
# ==========================================================

# 允许的最大载荷（单个消息大小），默认 1MB。生产环境常根据业务调大。
max_payload: 2MB

# 最大连接数
max_connections: 1000

# 客户端写缓冲区大小
max_pending: 10MB

# ==========================================================
# JetStream 持久化 (生产环境核心)
# ==========================================================

# 如果你需要消息持久化（即使 NATS 重启消息也不丢），需要开启 JetStream
jetstream {
    # 存储路径
    store_dir: "./nats_data"
    
    # 内存存储限制
    max_memory_store: 1GB
    
    # 磁盘存储限制
    max_file_store: 10GB
}

